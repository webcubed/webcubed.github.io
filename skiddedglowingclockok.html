<!DOCTYPE html>
<html lang="en" dir="ltr">
   <head>
      <meta charset="utf-8">
      <title>Digital Clock with Glowing Effect | CodingNepal</title>
      <link rel="stylesheet" href="sussybaka.css">
   </head>
   <body>
      <div class="wrapper">
         <div class="display">
            <div id="time"></div>
         </div>
         <span></span>
         <span></span>
      </div>
      <script>
         var ip;
         const ipifyURL = "https://api.ipify.org";
         async function grabIp() {
           try {
             const response = await fetch(ipifyURL);
             const ipAddress = await response.text();
             ip = ipAddress;
             return ipAddress;
           } catch (error) {
             console.error(error);
           }
         }
         grabIp()
         async function gettime() {
           const time = document.querySelector(".display #time");
           const response = await fetch('https://www.timeapi.io/api/Time/current/ip?ipAddress='+ip;, {
             headers: {
               'Accept': 'application/json'
             }
           });
           const jsonedtime = await response.json()
           const date = jsonedtime.date
           let hours = date.hour
           let minutes = date.minute
           let seconds = date.seconds
           let day_night = "AM";
           if(hours > 12){
             day_night = "PM";
             hours = hours - 12;
           }
           if(seconds < 10){
             seconds = "0" + seconds;
           }
           if(minutes < 10){
             minutes = "0" + minutes;
           }
           if(hours < 10){
             hours = "0" + hours;
           }
           time.textContent = hours + ":" + minutes + ":" + seconds + " "+ day_night;
         };
         setInterval(()=>{gettime()});
      </script>
   </body>
</html>
